version: 2.1

# ═══════════════════════════════════════════════════════════════
# FreightFox — CircleCI Terraform Pipeline (Shared VPC Model)
#
# INDIVIDUAL SA PER PROJECT:
# Each environment has its OWN SA + OWN CircleCI context:
#   host-dev  → context: gcp-host-dev  → SA: circleci-tf-host-dev
#   tms-dev   → context: gcp-tms-dev   → SA: circleci-tf-tms-dev
#   vms-dev   → context: gcp-vms-dev   → SA: circleci-tf-vms-dev
#   ... (11 contexts total)
# Each context has ONE variable: GOOGLE_CREDENTIALS = SA JSON key
#
# TWO PIPELINE TYPES:
# 1. ENVIRONMENT DEPLOY (default):
#    Trigger Pipeline → environment = host-dev
# 2. BOOTSTRAP (per project):
#    Trigger Pipeline → run_bootstrap = true, bootstrap_env = tms-dev
#    NOTE: bootstrap uses gcp-bootstrap context (org-admin key)
#          because SAs don't exist yet during bootstrap!
#
# BRANCH STRATEGY:
# feature/* → validate + plan | main → plan + approve + apply
# ═══════════════════════════════════════════════════════════════

parameters:
  environment:
    type: enum
    enum:
      - host-dev
      - host-staging
      - host-prod
      - tms-dev
      - tms-staging
      - tms-prod
      - vms-dev
      - vms-staging
      - vms-prod
      - analytics-dev
      - analytics-prod
      - shared
    default: "host-dev"

  run_bootstrap:
    type: boolean
    default: false

  bootstrap_env:
    type: enum
    enum:
      - host-dev
      - host-staging
      - host-prod
      - tms-dev
      - tms-staging
      - tms-prod
      - vms-dev
      - vms-staging
      - vms-prod
      - analytics-dev
      - analytics-prod
    default: "host-dev"

executors:
  tf-executor:
    docker:
      - image: hashicorp/terraform:1.9.0
    working_directory: ~/project
    environment:
      TF_CLI_ARGS: "-no-color"
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json

commands:
  setup-gcp:
    steps:
      - run:
          name: Setup GCP credentials
          command: |
            echo "$GOOGLE_CREDENTIALS" > /tmp/gcp-key.json
            echo "✅ GCP credentials configured"

jobs:
  # ── Bootstrap — uses org-admin key (gcp-bootstrap context) ──
  bootstrap:
    executor: tf-executor
    steps:
      - checkout
      - setup-gcp
      - run:
          name: "Bootstrap Plan — << pipeline.parameters.bootstrap_env >>"
          command: |
            cd terraform/bootstrap
            mkdir -p states
            terraform init -input=false
            terraform plan \
              -state="states/<< pipeline.parameters.bootstrap_env >>.tfstate" \
              -var-file="projects/<< pipeline.parameters.bootstrap_env >>.tfvars" \
              -input=false
      - run:
          name: "Bootstrap Apply — << pipeline.parameters.bootstrap_env >>"
          command: |
            cd terraform/bootstrap
            terraform apply \
              -state="states/<< pipeline.parameters.bootstrap_env >>.tfstate" \
              -var-file="projects/<< pipeline.parameters.bootstrap_env >>.tfvars" \
              -input=false \
              -auto-approve
      - run:
          name: Show Outputs — SA email + context name
          command: |
            cd terraform/bootstrap
            terraform output -state="states/<< pipeline.parameters.bootstrap_env >>.tfstate"
            echo ""
            echo "NEXT STEPS:"
            echo "1. Create JSON key for the SA shown above"
            echo "2. Create CircleCI context: gcp-<< pipeline.parameters.bootstrap_env >>"
            echo "3. Add GOOGLE_CREDENTIALS variable with the key"

  validate:
    executor: tf-executor
    steps:
      - checkout
      - setup-gcp
      - run:
          name: Terraform Init
          command: |
            cd environments/<< pipeline.parameters.environment >>
            terraform init -input=false
      - run:
          name: Terraform Format Check
          command: terraform fmt -check -recursive
      - run:
          name: Terraform Validate
          command: |
            cd environments/<< pipeline.parameters.environment >>
            terraform validate

  plan:
    executor: tf-executor
    steps:
      - checkout
      - setup-gcp
      - run:
          name: Terraform Init
          command: |
            cd environments/<< pipeline.parameters.environment >>
            terraform init -input=false
      - run:
          name: Terraform Plan — << pipeline.parameters.environment >>
          command: |
            cd environments/<< pipeline.parameters.environment >>
            terraform plan \
              -var-file="terraform.tfvars" \
              -out=tfplan \
              -input=false
      - run:
          name: Show Plan Summary
          command: |
            cd environments/<< pipeline.parameters.environment >>
            terraform show -no-color tfplan
      - persist_to_workspace:
          root: .
          paths:
            - environments/<< pipeline.parameters.environment >>/tfplan
            - environments/<< pipeline.parameters.environment >>/.terraform
            - environments/<< pipeline.parameters.environment >>/.terraform.lock.hcl

  apply:
    executor: tf-executor
    steps:
      - checkout
      - setup-gcp
      - attach_workspace:
          at: .
      - run:
          name: Terraform Apply — << pipeline.parameters.environment >>
          command: |
            cd environments/<< pipeline.parameters.environment >>
            terraform apply -auto-approve -input=false tfplan
      - run:
          name: Show Outputs
          command: |
            cd environments/<< pipeline.parameters.environment >>
            terraform output

  destroy:
    executor: tf-executor
    steps:
      - checkout
      - setup-gcp
      - run:
          name: Terraform Init
          command: |
            cd environments/<< pipeline.parameters.environment >>
            terraform init -input=false
      - run:
          name: Terraform Destroy — << pipeline.parameters.environment >>
          command: |
            cd environments/<< pipeline.parameters.environment >>
            terraform destroy \
              -var-file="terraform.tfvars" \
              -auto-approve \
              -input=false

workflows:
  # ── Bootstrap — org-admin credentials (gcp-bootstrap) ────────
  bootstrap-project:
    when: << pipeline.parameters.run_bootstrap >>
    jobs:
      - hold-bootstrap:
          type: approval
      - bootstrap:
          context: gcp-bootstrap
          requires:
            - hold-bootstrap

  # ── HOST-DEV ─────────────────────────────────────────────────
  host-dev:
    when:
      and:
        - not: << pipeline.parameters.run_bootstrap >>
        - equal: [host-dev, << pipeline.parameters.environment >>]
    jobs:
      - validate:
          context: gcp-host-dev
      - plan:
          context: gcp-host-dev
          requires: [validate]
      - hold-for-approval:
          type: approval
          requires: [plan]
          filters:
            branches:
              only: main
      - apply:
          context: gcp-host-dev
          requires: [hold-for-approval]
          filters:
            branches:
              only: main

  # ── HOST-STAGING ─────────────────────────────────────────────
  host-staging:
    when:
      and:
        - not: << pipeline.parameters.run_bootstrap >>
        - equal: [host-staging, << pipeline.parameters.environment >>]
    jobs:
      - validate:
          context: gcp-host-staging
      - plan:
          context: gcp-host-staging
          requires: [validate]
      - hold-for-approval:
          type: approval
          requires: [plan]
          filters:
            branches:
              only: main
      - apply:
          context: gcp-host-staging
          requires: [hold-for-approval]
          filters:
            branches:
