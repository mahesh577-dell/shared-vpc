  # ── Emergency destroy ────────────────────────────────────────
  destroy-infra:
    when:
      and:
        - not: << pipeline.parameters.run_bootstrap >>
        - equal: [destroy, << pipeline.git.branch >>]
    jobs:
      - hold-for-destroy:
          type: approval
      - destroy:
          context: gcp-<< pipeline.parameters.environment >>
          requires:
            - hold-for-destroy
