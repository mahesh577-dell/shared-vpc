          filters:
            branches:
              only: main
      - apply:
          context: gcp-host-prod
          requires: [hold-for-approval]
          filters:
            branches:
              only: main

  # ── TMS-DEV ──────────────────────────────────────────────────
  tms-dev:
    when:
      and:
        - not: << pipeline.parameters.run_bootstrap >>
